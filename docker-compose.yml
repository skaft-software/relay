services:
  gateway:
    build: .
    image: relay-gateway:local
    env_file: .env
    # Host networking is required for GPU passthrough (/dev/dri) and
    # direct access to the upstream llama.cpp server on localhost.
    # Trade-off: no Docker network isolation; firewall rules apply directly.
    network_mode: host
    # Share the host PID namespace so the lifecycle can kill/restart
    # llama-server processes via pkill.
    pid: host
    restart: on-failure:10
    volumes:
      # Mount only model directories and config — avoid exposing the
      # entire home directory (which contains .ssh, .aws, etc.).
      # Override RELAY_MODEL_DIR in .env to set your model path.
      - ${RELAY_MODEL_DIR:-${HOME}/models}:${RELAY_MODEL_DIR:-${HOME}/models}:ro
      - /usr/share/vulkan:/usr/share/vulkan:ro
      - /usr/lib/x86_64-linux-gnu/libvulkan_radeon.so:/usr/lib/x86_64-linux-gnu/libvulkan_radeon.so:ro
      - /usr/lib/x86_64-linux-gnu/libvulkan_lvp.so:/usr/lib/x86_64-linux-gnu/libvulkan_lvp.so:ro
      # Mount start scripts so the lifecycle can spawn model servers.
      # Keep these in sync with RELAY_MODEL_MAP entries in .env.
      - /home/achu/start-llama-devstral.sh:/home/achu/start-llama-devstral.sh:ro
      - /home/achu/start-llama-qwen36-mtp.sh:/home/achu/start-llama-qwen36-mtp.sh:ro
      - /home/achu/start-llama-mtp.sh:/home/achu/start-llama-mtp.sh:ro
      - /home/achu/start-llama-glm47.sh:/home/achu/start-llama-glm47.sh:ro
      - /home/achu/start-llama-north.sh:/home/achu/start-llama-north.sh:ro
      - /home/achu/start-llama-qwen27b.sh:/home/achu/start-llama-qwen27b.sh:ro
      - /home/achu/start-llama-gemma31b.sh:/home/achu/start-llama-gemma31b.sh:ro
      # Mount llama.cpp build and Jinja templates so child processes
      # can find the server binary and chat templates.
      - /home/achu/llama.cpp:/home/achu/llama.cpp:ro
      - /home/achu/templates:/home/achu/templates:ro
    devices:
      - /dev/dri:/dev/dri
