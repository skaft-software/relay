services:
  gateway:
    build: .
    image: relay-gateway:local
    environment:
      - HOST=${HOST:-127.0.0.1}
      - PORT=${PORT:-1234}
      - UPSTREAM_BASE_URL=${UPSTREAM_BASE_URL:-http://host.docker.internal:8080/v1}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-600}
      - MAX_REQUEST_BODY_BYTES=${MAX_REQUEST_BODY_BYTES:-1048576}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - API_KEY=${API_KEY:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      - RATE_LIMIT_AUTH_MAX=${RATE_LIMIT_AUTH_MAX:-20}
      - RATE_LIMIT_AUTH_WINDOW_SECONDS=${RATE_LIMIT_AUTH_WINDOW_SECONDS:-60}
      - RELAY_EXPOSE_UPSTREAM_ERRORS=${RELAY_EXPOSE_UPSTREAM_ERRORS:-false}
      - RELAY_OBSERVABILITY_CAPTURE_BODY=${RELAY_OBSERVABILITY_CAPTURE_BODY:-false}
      - UPSTREAM_CTX_SIZE=${UPSTREAM_CTX_SIZE:-131072}
      - RELAY_MODEL_PROFILE=${RELAY_MODEL_PROFILE:-qwen}
      - RELAY_REASONING_MODE=${RELAY_REASONING_MODE:-preserve}
      - RELAY_TOOL_MODE=${RELAY_TOOL_MODE:-auto}
      - RELAY_THINKING_SUPPORTED=${RELAY_THINKING_SUPPORTED:-true}
      - RELAY_THINKING_LEVELS=${RELAY_THINKING_LEVELS:-on,off}
      - RELAY_UNKNOWN_FIELD_POLICY=${RELAY_UNKNOWN_FIELD_POLICY:-pass_through}
      - RELAY_WARN_ON_STRIPPED_FIELDS=${RELAY_WARN_ON_STRIPPED_FIELDS:-true}
      - RELAY_OBSERVABILITY_ENABLED=${RELAY_OBSERVABILITY_ENABLED:-true}
      - RELAY_STRICT_COMPAT=${RELAY_STRICT_COMPAT:-false}
      - RELAY_STRICT_STARTUP=${RELAY_STRICT_STARTUP:-false}
      - RELAY_PROBE_ON_STARTUP=${RELAY_PROBE_ON_STARTUP:-true}
      - RELAY_PROBE_TIMEOUT_MS=${RELAY_PROBE_TIMEOUT_MS:-3000}
      - COMPLETION_TTL_SECONDS=${COMPLETION_TTL_SECONDS:-3600}
      - RELAY_REQUEST_HISTORY_LIMIT=${RELAY_REQUEST_HISTORY_LIMIT:-100}
      - RELAY_LOG_PROMPTS=${RELAY_LOG_PROMPTS:-false}
      - RELAY_ALLOWED_HOSTS=${RELAY_ALLOWED_HOSTS:-}
    ports:
      - "1234:1234"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
