services:
  gateway:
    build: .
    image: relay-gateway:local
    environment:
      - HOST=${HOST:-127.0.0.1}
      - PORT=${PORT:-1234}
      - UPSTREAM_BASE_URL=${UPSTREAM_BASE_URL:-http://host.docker.internal:8080/v1}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-600}
      - MAX_REQUEST_BODY_BYTES=${MAX_REQUEST_BODY_BYTES:-1048576}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - API_KEY=${API_KEY:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      - RATE_LIMIT_AUTH_MAX=${RATE_LIMIT_AUTH_MAX:-20}
      - RATE_LIMIT_AUTH_WINDOW_SECONDS=${RATE_LIMIT_AUTH_WINDOW_SECONDS:-60}
      - RELAY_EXPOSE_UPSTREAM_ERRORS=${RELAY_EXPOSE_UPSTREAM_ERRORS:-false}
      - RELAY_OBSERVABILITY_CAPTURE_BODY=${RELAY_OBSERVABILITY_CAPTURE_BODY:-false}
    ports:
      - "1234:1234"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
