# Generated by `relay docker` for this host — re-run to regenerate.
# Relay runs in this container; llama.cpp runs on the host, mounted in at
# identical paths so one RELAY_MODEL_MAP works in-container and bare-metal.
# Backend: vulkan
services:
  relay:
    build:
      context: /home/achu/relay
      dockerfile: Dockerfile
    image: skaft-relay:local
    container_name: relay
    restart: unless-stopped
    network_mode: host
    pid: host
    env_file:
      - /home/achu/relay/.env
    volumes:
      - /home/achu/models:/home/achu/models:ro
      - /home/achu/llama.cpp/build-vulkan:/home/achu/llama.cpp/build-vulkan:ro
      - /home/achu/relay/start-scripts:/home/achu/relay/start-scripts:ro
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - 991
      - 44
