# Generated by relay setup. Docker runs relay; llama.cpp runs on the host
# (mounted in at identical paths). host networking + host PID let relay launch
# and manage model servers exactly like a bare-metal install.
services:
  relay:
    build: .
    image: relay-gateway:local
    container_name: relay
    restart: unless-stopped
    network_mode: host
    pid: host
    env_file:
      - .env
    volumes:
      - /home/achu/models:/home/achu/models:ro
      - /home/achu/llama.cpp/build:/home/achu/llama.cpp/build:ro
      - /home/achu/.relay/start-scripts:/relay/start-scripts:ro
      - /home/achu/templates:/home/achu/templates:ro
    devices:
      - /dev/dri:/dev/dri
