services:
  gateway:
    build: .
    image: relay-gateway:local
    env_file: .env
    # Host networking is required for GPU passthrough (/dev/dri) and
    # direct access to the upstream llama.cpp server on localhost.
    # Trade-off: no Docker network isolation; firewall rules apply directly.
    network_mode: host
    # Share the host PID namespace so the lifecycle can kill/restart
    # llama-server processes via pkill.
    pid: host
    restart: on-failure:10
    volumes:
      # Mount only model directories and config — avoid exposing the
      # entire home directory (which contains .ssh, .aws, etc.).
      # Override RELAY_MODEL_DIR in .env to set your model path.
      - ${RELAY_MODEL_DIR:-${HOME}/models}:${RELAY_MODEL_DIR:-${HOME}/models}:ro
      - /usr/share/vulkan:/usr/share/vulkan:ro
    devices:
      - /dev/dri:/dev/dri
