# Generated by relay setup. Docker runs relay; llama.cpp runs on the host
# (mounted in at identical paths). host networking + host PID let relay launch
# and manage model servers exactly like a bare-metal install.
#
# Edit ${HOME} paths below to match your machine, then:
#   docker compose up -d
services:
  relay:
    build: .
    image: relay-gateway:local
    container_name: relay
    restart: unless-stopped
    network_mode: host
    pid: host
    env_file:
      - .env
    volumes:
      - ${HOME:-~}/models:${HOME:-~}/models:ro
      - ${HOME:-~}/llama.cpp/build:${HOME:-~}/llama.cpp/build:ro
      - ${HOME:-~}/.relay/start-scripts:/relay/start-scripts:ro
    devices:
      - /dev/dri:/dev/dri
